apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightnovel-studio
  namespace: poc-lightnovel-studio
  labels:
    app: lightnovel-studio
    autopoc.io/project: lightnovel-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lightnovel-studio
  template:
    metadata:
      labels:
        app: lightnovel-studio
    spec:
      containers:
        - name: lightnovel-studio
          image: quay.io/aicatalyst/lightnovel-studio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
